services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=<qbittorrent-uid>  # run: id qbittorrent
      - PGID=<media-gid>        # run: getent group media
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    volumes:
      - ./config:/config
      - ./config/qBittorrent/nova3/engines:/config/qBittorrent/nova3/engines  # search plugins
      - /mnt/plex01:/mnt/plex01
    ports:
      - "8080:8080"
      - "6881:6881"       # torrent traffic (TCP)
      - "6881:6881/udp"   # torrent traffic (UDP)
    restart: unless-stopped
