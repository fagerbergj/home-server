services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    runtime: nvidia
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - VERSION=docker
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility
      - PLEX_CLAIM=        # get token from plex.tv/claim (expires in 4 min)
    volumes:
      - ./config:/config
      - /mnt/media:/mnt/media
      - /mnt/storage:/mnt/storage
    restart: unless-stopped
