services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    runtime: nvidia
    environment:
      - PUID=<plex-uid>   # run: id plex
      - PGID=<media-gid>  # run: getent group media
      - TZ=America/Chicago
      - VERSION=docker
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility
      - PLEX_CLAIM=        # get token from plex.tv/claim (expires in 4 min)
    volumes:
      - ./config:/config
      - /mnt/plex01:/mnt/plex01
    restart: unless-stopped
